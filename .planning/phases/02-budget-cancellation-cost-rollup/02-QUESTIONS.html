  }
}

function recomputeStats() {
  let total = 0, answered = 0, chat_more = 0;
  for (const s of state.sections) for (const q of s.questions) {
    total += 1;
    if (q.answer) answered += 1;
    if (q.chat_more && q.chat_more.trim()) chat_more += 1;
  }
  state.stats = { total, answered, chat_more, remaining: total - answered };
  document.getElementById("stat-answered").textContent = answered;
  document.getElementById("stat-total").textContent = total;
  document.getElementById("stat-remaining").textContent = total - answered;
  document.getElementById("stat-chatmore").textContent = chat_more;
  document.getElementById("progress-fill").style.width = total ? (answered / total * 100) + "%" : "0%";
}

function renderQuestion(q) {
  const wrap = document.createElement("div");
  wrap.className = "card" + (q.answer ? " answered" : "");
  wrap.dataset.id = q.id;

  const id = document.createElement("div");
  id.className = "id";
  id.textContent = q.id;
  wrap.appendChild(id);

  const h = document.createElement("h3");
  h.textContent = q.title;
  wrap.appendChild(h);

  if (q.context) {
    const c = document.createElement("div");
    c.className = "ctx";
    c.textContent = q.context;
    wrap.appendChild(c);
  }

  for (const opt of q.options) {
    const lab = document.createElement("label");
    lab.className = "opt";
    const r = document.createElement("input");
    r.type = "radio";
    r.name = q.id;
    r.value = opt.id;
    if (q.answer === opt.id) r.checked = true;
    r.addEventListener("change", () => {
      q.answer = opt.id;
      q.status = "answered";
      wrap.classList.add("answered");
      recomputeStats();
    });
    const body = document.createElement("div");
    const l = document.createElement("div"); l.className = "lbl"; l.textContent = opt.label;
    const d = document.createElement("div"); d.className = "desc"; d.textContent = opt.description;
    body.appendChild(l); body.appendChild(d);
    lab.appendChild(r);
    lab.appendChild(body);
    wrap.appendChild(lab);
  }

  const ta = document.createElement("textarea");
  ta.placeholder = "Add context, nuance, or clarification…";
  ta.value = q.chat_more || "";
  if (ta.value.trim()) ta.classList.add("has-content");
  ta.addEventListener("input", () => {
    q.chat_more = ta.value;
    ta.classList.toggle("has-content", !!ta.value.trim());
    recomputeStats();
  });
  wrap.appendChild(ta);

  return wrap;
}

function renderSection(s) {
  const sec = document.createElement("section");
  const head = document.createElement("div");
  head.className = "section-head";
  const h = document.createElement("h2");
  h.textContent = s.title;
  const cnt = document.createElement("span");
  cnt.className = "count";
  const ansHere = s.questions.filter(q => q.answer).length;
  cnt.textContent = `${ansHere}/${s.questions.length} answered`;
  head.appendChild(h);
  head.appendChild(cnt);
  sec.appendChild(head);

  const grid = document.createElement("div");
  grid.className = "grid";
  for (const q of s.questions) grid.appendChild(renderQuestion(q));
  sec.appendChild(grid);

  head.addEventListener("click", () => grid.style.display = grid.style.display === "none" ? "" : "none");
  return sec;
}

function render() {
  const root = document.getElementById("root");
  root.innerHTML = "";
  for (const s of state.sections) root.appendChild(renderSection(s));

  const banner = document.createElement("div");
  banner.className = "save-banner";
  banner.innerHTML = `When done: click <strong>Download JSON</strong>, replace <code>${STATE_PATH}</code> with the file, then tell Claude <strong>"refresh"</strong> or <strong>"finalize"</strong>.`;
  root.appendChild(banner);

  recomputeStats();
}

function serialize() {
  recomputeStats();
  return JSON.stringify(state, null, 2);
}

document.getElementById("download-json").addEventListener("click", () => {
  const blob = new Blob([serialize()], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = "02-QUESTIONS.json";
  a.click();
  URL.revokeObjectURL(url);
});

document.getElementById("copy-json").addEventListener("click", async () => {
  await navigator.clipboard.writeText(serialize());
  const b = document.getElementById("copy-json");
  const t = b.textContent;
  b.textContent = "Copied!";
  setTimeout(() => b.textContent = t, 1200);
});

(async () => { await loadState(); render(); })();
</script>
</body>
</html>
