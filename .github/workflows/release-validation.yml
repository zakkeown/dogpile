name: Release Validation

on:
  pull_request:
  push:
    branches:
      - main
      - "release/**"

jobs:
  package-identity:
    name: Scoped package identity
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Reject stale unscoped package references
        run: pnpm run package:identity

  required-node-suite:
    name: Required Node.js ${{ matrix.node-version }} full suite
    runs-on: ubuntu-latest
    needs: package-identity
    strategy:
      fail-fast: false
      matrix:
        node-version:
          - 22
          - 24
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify SDK
        run: pnpm run verify

  required-bun-latest-suite:
    name: Required Bun latest full suite
    runs-on: ubuntu-latest
    needs: package-identity
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify SDK on Bun
        run: |
          bun run package:identity
          bun run build
          bun run typecheck
          bun run test

  required-browser-bundle-smoke:
    name: Required browser bundle smoke
    runs-on: ubuntu-latest
    needs: package-identity
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build browser bundle and run smoke test
        run: pnpm run browser:smoke

  required-packed-tarball-quickstart-smoke:
    name: Required packed-tarball quickstart smoke
    runs-on: ubuntu-latest
    needs: package-identity
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run packed-tarball quickstart smoke
        run: pnpm run quickstart:smoke

  required-pack-check:
    name: Required pack:check package artifact
    runs-on: ubuntu-latest
    needs:
      - package-identity
      - required-node-suite
      - required-bun-latest-suite
      - required-browser-bundle-smoke
      - required-packed-tarball-quickstart-smoke
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Enable pnpm
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify npm package dry-run
        run: pnpm run pack:check
