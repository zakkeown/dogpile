name: Publish Package to npm

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run the publish pipeline without publishing to npm."
        required: true
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: npm-publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Publish @dogpile/sdk
    runs-on: ubuntu-latest
    environment:
      name: npm
      url: https://www.npmjs.com/package/@dogpile/sdk
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: "https://registry.npmjs.org"

      - name: Enable pnpm
        run: corepack enable

      - name: Install latest npm CLI for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify package before publish
        run: pnpm run publish:check

      - name: Read package version
        id: package
        run: |
          version="$(node -p "require('./package.json').version")"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          expected_tag="v${{ steps.package.outputs.version }}"
          actual_tag="${{ github.event.release.tag_name }}"
          if [ "$actual_tag" != "$expected_tag" ]; then
            echo "::error title=Release tag mismatch::Expected $expected_tag for package version ${{ steps.package.outputs.version }}, got $actual_tag."
            exit 1
          fi

      - name: Stop if this version is already published
        run: |
          if npm view "@dogpile/sdk@${{ steps.package.outputs.version }}" version >/dev/null 2>&1; then
            echo "::error title=Version already published::@dogpile/sdk@${{ steps.package.outputs.version }} already exists on npm."
            exit 1
          fi

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run
        run: npm publish --dry-run --access public --cache ./.npm-cache

      - name: Publish package
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && !inputs.dry_run)
        run: npm publish --access public
